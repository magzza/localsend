name: Build LocalSend for Debian 10 ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LocalSend
        uses: actions/checkout@v4
        with:
          repository: localsend/localsend
          ref: v1.17.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create Swap Space to prevent OOM
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build in Debian 10 ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:10 \
            bash -c "
              set -e
              # ... (中间的替换源、安装依赖、安装Flutter等代码保持不变) ...
              
              # 8. 回到项目 app 目录
              cd /workspace/app
              
              # 9. 移除 CMake 中的 -Werror，防止 Debian 10 的旧编译器警告中断构建
              if [ -f linux/CMakeLists.txt ]; then
                sed -i 's/-Werror/-Wno-unused-function/g' linux/CMakeLists.txt
              fi
              
              # 10. 获取依赖
              flutter pub get
              
              # 11. 构建 Linux 版本 (开启详细日志输出)
              flutter build linux --release -v
              
              # 12. 打包成 tar.gz
              cd build/linux/arm64/release/bundle
              tar czf /workspace/localsend-1.17.0-debian10-arm64.tar.gz *
              
              echo 'Build complete!'
            "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-debian10-arm64
          path: localsend-*.tar.gz
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          files: localsend-*.tar.gz
          tag_name: debian10-arm64-${{ github.run_number }}
          name: LocalSend for Debian 10 ARM64
          body: |
            Built for Debian 10 (glibc 2.28) on ARM64
            
            Usage:
            1. Download the tar.gz file
            2. Extract: \`tar xzf localsend-*.tar.gz\`
            3. Run: \`./localsend_app\`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
