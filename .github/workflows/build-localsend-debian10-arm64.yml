name: Build LocalSend for Debian 10 ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LocalSend
        uses: actions/checkout@v4
        with:
          repository: localsend/localsend
          ref: v1.17.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create Swap Space to prevent OOM
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build in Debian 10 ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:10 \
            bash -c "
              set -e
              
              # 1. 替换 Debian 10 源为 archive 源 (使用 echo 避免 EOF 缩进冲突)
              echo 'deb http://archive.debian.org/debian/ buster main contrib non-free' > /etc/apt/sources.list
              echo 'deb-src http://archive.debian.org/debian/ buster main contrib non-free' >> /etc/apt/sources.list
              echo 'deb http://archive.debian.org/debian-security/ buster/updates main contrib non-free' >> /etc/apt/sources.list
              echo 'deb-src http://archive.debian.org/debian-security/ buster/updates main contrib non-free' >> /etc/apt/sources.list
              echo 'deb http://archive.debian.org/debian/ buster-updates main contrib non-free' >> /etc/apt/sources.list
              echo 'deb-src http://archive.debian.org/debian/ buster-updates main contrib non-free' >> /etc/apt/sources.list
              echo 'deb http://archive.debian.org/debian/ buster-backports main contrib non-free' >> /etc/apt/sources.list
              echo 'deb-src http://archive.debian.org/debian/ buster-backports main contrib non-free' >> /etc/apt/sources.list
              
              # 2. 更新源 (忽略过期检查)
              apt-get -o Acquire::Check-Valid-Until=false update
              
              # 3. 安装基础依赖
              apt-get install -y \
                git \
                curl \
                unzip \
                xz-utils \
                clang \
                cmake \
                ninja-build \
                pkg-config \
                libgtk-3-dev \
                libblkid-dev \
                liblzma-dev \
                libstdc++-8-dev \
                libappindicator3-dev
              
              # 4. 解决挂载目录的 Git 权限问题
              git config --global --add safe.directory '*'
              
              # 5. 安装 Flutter (升级到 3.24.5)
              cd /opt
              git clone https://github.com/flutter/flutter.git -b 3.24.5 /opt/flutter
              export PATH=\"/opt/flutter/bin:\$PATH\"
              
              # 6. 禁用 Flutter 遥测
              flutter config --no-analytics
              
              # 7. 预下载 Flutter 依赖
              flutter precache
              
              # 8. 回到项目 app 目录
              cd /workspace/app
              
              # 9. 移除 CMake 中的 -Werror，防止 Debian 10 的旧编译器警告中断构建
              if [ -f linux/CMakeLists.txt ]; then
                sed -i 's/-Werror/-Wno-unused-function/g' linux/CMakeLists.txt
              fi
              
              # 10. 获取依赖
              flutter pub get
              
              # 11. 构建 Linux 版本 (加上 -v 输出极其详细的日志，防 OOM)
              flutter build linux --release -v
              
              # 12. 打包成 tar.gz
              cd build/linux/arm64/release/bundle
              tar czf /workspace/localsend-1.17.0-debian10-arm64.tar.gz *
              
              echo 'Build complete!'
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-debian10-arm64
          path: localsend-*.tar.gz
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          files: localsend-*.tar.gz
          tag_name: debian10-arm64-${{ github.run_number }}
          name: LocalSend for Debian 10 ARM64
          body: |
            Built for Debian 10 (glibc 2.28) on ARM64
            
            Usage:
            1. Download the tar.gz file
            2. Extract: \`tar xzf localsend-*.tar.gz\`
            3. Run: \`./localsend_app\`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
