name: Build LocalSend for Debian 10 ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LocalSend
        uses: actions/checkout@v4
        with:
          repository: localsend/localsend
          ref: v1.17.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in Debian 10 ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:10 \
            bash -c "
              set -e
              
              # 更新源
              apt-get update
              
              # 安装基础依赖
              apt-get install -y \
                git \
                curl \
                unzip \
                xz-utils \
                clang \
                cmake \
                ninja-build \
                pkg-config \
                libgtk-3-dev \
                libblkid-dev \
                liblzma-dev \
                libstdc++-8-dev
              
              # 安装 Flutter (使用 3.16.x 版本，兼容 Debian 10)
              cd /opt
              curl -O https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.16.9-stable.tar.xz
              tar xf flutter_linux_3.16.9-stable.tar.xz
              export PATH=\"/opt/flutter/bin:\$PATH\"
              
              # 禁用 Flutter 遥测
              flutter config --no-analytics
              
              # 预下载 Flutter 依赖
              flutter precache
              
              # 回到项目目录
              cd /workspace
              
              # 进入 app 目录
              cd app
              
              # 获取依赖
              flutter pub get
              
              # 构建 Linux 版本
              flutter build linux --release
              
              # 打包成 tar.gz
              cd build/linux/arm64/release/bundle
              tar czf /workspace/localsend-1.17.0-debian10-arm64.tar.gz *
              
              echo 'Build complete!'
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-debian10-arm64
          path: localsend-*.tar.gz
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          files: localsend-*.tar.gz
          tag_name: debian10-arm64-${{ github.run_number }}
          name: LocalSend for Debian 10 ARM64
          body: |
            Built for Debian 10 (glibc 2.28) on ARM64
            
            Usage:
            1. Download the tar.gz file
            2. Extract: `tar xzf localsend-*.tar.gz`
            3. Run: `./localsend_app`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
